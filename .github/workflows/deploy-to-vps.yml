name: Deploy to VPS (manual)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker tag to deploy (latest/dev/main-<sha>/dev-<sha>)"
        required: true
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd ~/stasiswp

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            docker pull ghcr.io/matteygg/stasis-web:${{ github.event.inputs.image_tag }}
            docker tag ghcr.io/matteygg/stasis-web:${{ github.event.inputs.image_tag }} ghcr.io/matteygg/stasis-web:latest

            docker-compose up -d --no-deps --force-recreate app

            echo "========== APP LOGS =========="
            docker-compose logs app --tail=80

            echo "========== HEALTHCHECK =========="
            for i in $(seq 1 24); do
              if curl -fsS https://stasis-wp.ru/api/health >/dev/null; then
                echo "Healthcheck OK on attempt $i"
                exit 0
              fi
              echo "Healthcheck not ready (attempt $i), waiting 5s..."
              sleep 5
            done

            echo "Healthcheck failed after retries"
            docker-compose logs app --tail=200
            exit 1

      - name: Notify Telegram (success)
        if: success()
        run: |
          TEXT="✅ STASIS-web: успешный деплой\nТег: ${{ github.event.inputs.image_tag }}\nhttps://stasis-wp.ru"
          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TG_CHAT_ID }}\",\"text\":\"$TEXT\"}" >/dev/null

      - name: Notify Telegram (failure)
        if: failure()
        run: |
          TEXT="❌ STASIS-web: деплой неуспешен\nТег: ${{ github.event.inputs.image_tag }}"
          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TG_CHAT_ID }}\",\"text\":\"$TEXT\"}" >/dev/null
