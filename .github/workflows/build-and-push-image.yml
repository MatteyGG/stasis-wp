name: Build and Push Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image tags
        id: vars
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/stasis-web"
          SHA_TAG="${GITHUB_SHA::7}"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tags=${IMAGE}:latest,${IMAGE}:main-${SHA_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE}:dev,${IMAGE}:dev-${SHA_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER != '' && secrets.GHCR_USER || github.actor }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Telegram (success)
        if: success()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "${TG_BOT_TOKEN:-}" ] || [ -z "${TG_CHAT_ID:-}" ]; then
            echo "TG secrets not set, skip"
            exit 0
          fi
          TEXT="✅ stasis-wp: новый образ опубликован
          branch: ${{ github.ref_name }}
          sha: ${{ github.sha }}
          tags: ${{ steps.vars.outputs.tags }}
          run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RESP=$(curl -fsS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            --data-urlencode text="$TEXT")
          echo "TG response: $RESP"

      - name: Notify Telegram (failure)
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "${TG_BOT_TOKEN:-}" ] || [ -z "${TG_CHAT_ID:-}" ]; then
            echo "TG secrets not set, skip"
            exit 0
          fi
          TEXT="❌ stasis-wp: ошибка сборки образа
          branch: ${{ github.ref_name }}
          sha: ${{ github.sha }}
          run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RESP=$(curl -fsS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            --data-urlencode text="$TEXT")
          echo "TG response: $RESP"
